version: '3.8'\n\nservices:\n  flask-app:\n    image: flask-app:latest\n    build: ./flask-app\n    ports:\n      - '5000:5000'\n    networks:\n      - dev-net\n    healthcheck:\n      test: ['CMD-SHELL', 'curl --fail http://localhost:5000/ || exit 1']\n      interval: 30s\n      timeout: 10s\n      retries: 5\n\n  prometheus:\n    image: prom/prometheus:latest\n    ports:\n      - '9090:9090'\n    volumes:\n      - ./prometheus:/etc/prometheus/prometheus.yml\n    networks:\n      - dev-net\n    healthcheck:\n      test: ['CMD-SHELL', 'curl --fail http://localhost:9090/ || exit 1']\n      interval: 30s\n      timeout: 10s\n      retries: 5\n\n  grafana:\n    image: grafana/grafana:latest\n    ports:\n      - '3000:3000'\n    networks:\n      - dev-net\n    healthcheck:\n      test: ['CMD-SHELL', 'curl --fail http://localhost:3000/ || exit 1']\n      interval: 30s\n      timeout: 10s\n      retries: 5\n\n  jaeger:\n    image: jaegertracing/all-in-one:1.29\n    ports:\n      - '5775:5775'\n      - '6831:6831/udp'\n      - '16686:16686'\n      - '14268:14268'\n    networks:\n      - dev-net\n    healthcheck:\n      test: ['CMD-SHELL', 'curl --fail http://localhost:16686/ || exit 1']\n      interval: 30s\n      timeout: 10s\n      retries: 5\n\nnetworks:\n  dev-net:\n    driver: bridge\n