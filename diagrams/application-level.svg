<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">Application Level Observability Flow</title>
  <desc id="desc">User request flow through Flask application with metrics and tracing to Prometheus, Grafana, and Jaeger.</desc>

  <defs>
    <style>
      .title { font: 700 28px 'Segoe UI', Arial, sans-serif; fill: #102a43; }
      .subtitle { font: 500 16px 'Segoe UI', Arial, sans-serif; fill: #334e68; }
      .node-title { font: 700 16px 'Segoe UI', Arial, sans-serif; fill: #102a43; }
      .node-text { font: 500 13px 'Segoe UI', Arial, sans-serif; fill: #243b53; }
      .lane-title { font: 700 15px 'Segoe UI', Arial, sans-serif; fill: #486581; }
      .arrow-label { font: 600 12px 'Segoe UI', Arial, sans-serif; fill: #334e68; }
      .edge { stroke: #334e68; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .edge-dashed { stroke: #486581; stroke-width: 2; stroke-dasharray: 8 6; fill: none; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="9" refX="10" refY="4.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L11,4.5 L0,9 z" fill="#334e68" />
    </marker>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fbff" />
      <stop offset="100%" stop-color="#eef6ff" />
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="1200" height="680" fill="url(#bg)" />

  <text x="40" y="54" class="title">Application Level Architecture (py-grafana-docker)</text>
  <text x="40" y="82" class="subtitle">Flask request path, Prometheus metrics, OpenTelemetry traces, and visualization components</text>

  <rect x="30" y="110" width="1140" height="170" rx="14" fill="#ffffff" stroke="#cddff2" />
  <text x="50" y="140" class="lane-title">Request Handling Lane</text>

  <rect x="80" y="165" width="180" height="90" rx="12" fill="#f0f9ff" stroke="#7cc4fa" />
  <text x="100" y="195" class="node-title">Client / Browser</text>
  <text x="100" y="216" class="node-text">Calls GET /</text>
  <text x="100" y="236" class="node-text">Receives response</text>

  <rect x="340" y="155" width="260" height="110" rx="12" fill="#f2fce2" stroke="#9bc766" />
  <text x="360" y="188" class="node-title">Flask App (app.py)</text>
  <text x="360" y="210" class="node-text">Route: / on :5000</text>
  <text x="360" y="230" class="node-text">Span: GET /</text>
  <text x="360" y="250" class="node-text">Metric: request_duration_seconds</text>

  <path d="M260 210 L340 210" class="edge" />
  <text x="275" y="197" class="arrow-label">HTTP GET /</text>

  <path d="M340 240 L260 240" class="edge" />
  <text x="272" y="262" class="arrow-label">200 Hello, World!</text>

  <rect x="30" y="300" width="1140" height="330" rx="14" fill="#ffffff" stroke="#cddff2" />
  <text x="50" y="330" class="lane-title">Observability Lane</text>

  <rect x="690" y="360" width="220" height="95" rx="12" fill="#fff7ed" stroke="#f6ad55" />
  <text x="710" y="391" class="node-title">Prometheus</text>
  <text x="710" y="412" class="node-text">Scrapes :8000/metrics</text>
  <text x="710" y="432" class="node-text">Stores TSDB samples</text>

  <rect x="960" y="360" width="180" height="95" rx="12" fill="#ecfeff" stroke="#55c7d8" />
  <text x="980" y="391" class="node-title">Grafana</text>
  <text x="980" y="412" class="node-text">Datasource:</text>
  <text x="980" y="432" class="node-text">Prometheus :9090</text>

  <rect x="690" y="500" width="220" height="95" rx="12" fill="#fdf2f8" stroke="#f687b3" />
  <text x="710" y="531" class="node-title">Jaeger</text>
  <text x="710" y="552" class="node-text">OTLP gRPC :4317</text>
  <text x="710" y="572" class="node-text">Trace UI :16686</text>

  <rect x="960" y="500" width="180" height="95" rx="12" fill="#fffbea" stroke="#d69e2e" />
  <text x="980" y="531" class="node-title">Operations User</text>
  <text x="980" y="552" class="node-text">Views dashboards</text>
  <text x="980" y="572" class="node-text">Inspects traces</text>

  <path d="M600 205 C655 205, 660 380, 690 400" class="edge-dashed" />
  <text x="605" y="305" class="arrow-label">Prometheus metric stream</text>

  <path d="M600 225 C655 250, 660 520, 690 540" class="edge-dashed" />
  <text x="605" y="430" class="arrow-label">OTLP trace export</text>

  <path d="M910 408 L960 408" class="edge" />
  <text x="918" y="394" class="arrow-label">PromQL data</text>

  <path d="M1048 500 L1048 455" class="edge" />
  <text x="1058" y="482" class="arrow-label">Dashboard UI</text>

  <path d="M960 545 L910 545" class="edge" />
  <text x="920" y="533" class="arrow-label">Trace query</text>

  <path d="M910 570 L960 570" class="edge" />
  <text x="918" y="590" class="arrow-label">Trace details</text>

  <text x="40" y="662" class="subtitle">Repository sources: app.py, docker-compose.yml, monitoring/prometheus.yml, Grafana datasource provisioning</text>
</svg>
